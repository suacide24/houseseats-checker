name: Health Check

on:
  schedule:
    # Every 3 hours (offset from the :00/:30 check-shows runs).
    - cron: '17 */3 * * *'
  workflow_dispatch:  # Allow manual trigger

# Serialize with the show checker so their pushes don't race.
concurrency:
  group: houseseats-git
  cancel-in-progress: false

jobs:
  health:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run health check
        env:
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
          # Failure alerts are separate from show-notification email. Toggle via
          # Settings > Secrets and variables > Actions > Variables:
          #   HEALTH_ALERTS_ENABLED=false  -> mute failure alerts
          #   HEALTH_STALE_HOURS=6         -> hours stale before alerting (optional)
          HEALTH_ALERTS_ENABLED: ${{ vars.HEALTH_ALERTS_ENABLED }}
          HEALTH_STALE_HOURS: ${{ vars.HEALTH_STALE_HOURS }}
        run: python check_health.py

      - name: Commit health state if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add health_state.json
          if ! git diff --staged --quiet; then
            git commit -m "Update health state - $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main
            git push
          fi
